<!-- Modal Editar -->
<div class="modal fade" id="modalEditar{{ producto.idProducto }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{% url 'editar_producto' producto.idProducto %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required minlength="3" maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label>Precio</label>
                        <input type="text" inputmode="numeric" name="precio" class="form-control" 
                    value="{{ producto.precio }}" required min="1">
                    <div class="mb-3">
                        <label>Stock</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required min="0">
                    </div>
                    <div class="mb-3">
                        <label>Marca</label>
                        <select name="idMarca" class="form-control" required>
                            <option value="">Seleccione una marca</option>
                            {% for marca in marcas %}
                                <option value="{{ marca.idMarca }}" {% if producto.idMarca.idMarca == marca.idMarca %}selected{% endif %}>
                                    {{ marca.nombreMarca }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Tipo</label>
                        <select name="idTipo" class="form-control" required>
                            <option value="">Seleccione un tipo</option>
                            {% for tipo in tipos %}
                                <option value="{{ tipo.idTipo }}" {% if producto.idTipo.idTipo == tipo.idTipo %}selected{% endif %}>
                                    {{ tipo.nombre_tipo }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Unidad de Medida</label>
                        <select name="idUnidad" class="form-control" required>
                            <option value="">Seleccione una unidad</option>
                            {% for unidad in unidades %}
                                <option value="{{ unidad.idUnidad }}" {% if producto.idUnidad.idUnidad == unidad.idUnidad %}selected{% endif %}>
                                    {{ unidad.nombre_unidad }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-warning">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
