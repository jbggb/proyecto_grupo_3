<!-- Modal Agregar -->
<div class="modal fade" id="modalAgregar" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Agregar Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{% url 'crear_producto' %}" id="formAgregarProducto">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Producto <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="nombre" required
                                   oninput="bloquearNumeros(this, 'add_nombre_error')"
                                   placeholder="Ej: Arroz Diana">
                            <div id="add_nombre_error" class="text-danger small mt-1" style="display:none;"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="text" inputmode="numeric" class="form-control" name="precio" required
                                       oninput="validarPrecio(this, 'add_precio_error')"
                                       placeholder="Ej: 5000">
                            </div>
                            <div id="add_precio_error" class="text-danger small mt-1" style="display:none;"></div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock <span class="text-danger">*</span></label>
                            <input type="text" inputmode="numeric" class="form-control" name="stock" required
                                   oninput="validarStock(this, 'add_stock_error')"
                                   placeholder="Ej: 100">
                            <div id="add_stock_error" class="text-danger small mt-1" style="display:none;"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Marca <span class="text-danger">*</span></label>
                            <select class="form-select" name="idMarca" required>
                                <option value="">Seleccione una marca</option>
                                {% for marca in marcas %}
                                    <option value="{{ marca.idMarca }}">{{ marca.nombreMarca }}</option>
                                {% endfor %}
                            </select>
                            <a href="{% url 'marcas' %}?next=productos" class="text-success small mt-1 d-block">+ Gestionar Marcas</a>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo de Producto <span class="text-danger">*</span></label>
                            <select class="form-select" name="idTipo" required>
                                <option value="">Seleccione un tipo</option>
                                {% for tipo in tipos %}
                                    <option value="{{ tipo.idTipo }}">{{ tipo.nombre_tipo }}</option>
                                {% endfor %}
                            </select>
                            <a href="{% url 'tipos' %}?next=productos" class="text-success small mt-1 d-block">+ Gestionar Tipos</a>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Unidad de Medida <span class="text-danger">*</span></label>
                            <select class="form-select" name="idUnidad" required>
                                <option value="">Seleccione una unidad</option>
                                {% for unidad in unidades %}
                                    <option value="{{ unidad.idUnidad }}">{{ unidad.nombre_unidad }} ({{ unidad.abreviatura }})</option>
                                {% endfor %}
                            </select>
                            <a href="{% url 'unidades' %}?next=productos" class="text-success small mt-1 d-block">+ Gestionar Unidades</a>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>
