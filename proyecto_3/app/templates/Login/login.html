{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Inventario Grupo 3</title>
    <link href="{% static 'css/l.css' %}" rel="stylesheet">
    <link href="{% static 'css/lo.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="card">
            <div class="login-card-body">

                <!-- Logo -->
                <div class="login-logo">
                    <a href="{% url 'inicio' %}">
                        <i class="fa-solid fa-shop"></i><br>
                        <b>Sistema de Inventario</b>
                    </a>
                    <p class="login-box-msg">Grupo 3</p>
                </div>

                <!-- Formulario -->
                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group mb-3">
                        <input type="text" name="username" class="form-control" 
                               placeholder="Usuario" required autofocus>
                        <span class="input-group-text">
                            <i class="fa-solid fa-user"></i>
                        </span>
                    </div>

                    <div class="input-group mb-3">
                        <input type="password" name="password" id="passwordInput"
                               class="form-control" placeholder="Contraseña" required>
                        <span class="input-group-text" onclick="togglePassword()" style="cursor: pointer;">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </span>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar Sesión
                            </button>
                        </div>
                    </div>

                    <div class="text-center">
                        <p class="mb-0">
                            <span class="text-muted">¿No tienes cuenta?</span>
                            <a href="{% url 'registro_administrador' %}" class="ms-1">
                                Regístrate aquí
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
