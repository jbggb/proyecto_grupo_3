{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Despecho — Panel Administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --rojo:      #9b1c1c;
            --rojo-mid:  #b91c1c;
            --rojo-light:#dc2626;
            --dorado:    #f59e0b;
            --texto:     #1a1a1a;
            --gris:      #6b7280;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: linear-gradient(150deg, #3c3b38 0%, #1b1d1b 45%, #161615 100%);
            position: relative;
            overflow: hidden;
        }

        /* Puntos de fondo */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        /* Círculos decorativos */
        .deco-1 {
            position: fixed;
            top: -120px; right: -120px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: rgba(255,255,255,.04);
            pointer-events: none;
        }
        .deco-2 {
            position: fixed;
            bottom: -80px; left: -80px;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,.03);
            pointer-events: none;
        }

        /* Tarjeta principal */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.2);
        }

        /* Cabecera de la tarjeta */
        .card-header {
            background: linear-gradient(145deg, #7f1d1d, #9b1c1c);
            padding: 32px 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: -30px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 60px;
            background: #fff;
            border-radius: 50% 50% 0 0;
        }

        .logo-wrap {
            width: 80px; height: 80px;
            border-radius: 18px;
            background: rgba(255,255,255,.12);
            border: 2px solid rgba(255,255,255,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            overflow: hidden;
        }

        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .card-title span { color: var(--dorado); font-style: italic; }

        .card-sub {
            font-size: .78rem;
            color: rgba(255,255,255,.6);
            letter-spacing: .04em;
        }

        /* Cuerpo del formulario */
        .card-body {
            padding: 36px 36px 32px;
        }

        .form-eyebrow {
            font-size: .7rem;
            font-weight: 600;
            color: var(--rojo-mid);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 6px;
        }

        .form-title {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--texto);
            margin-bottom: 24px;
        }

        /* Alertas */
        .alerts { margin-bottom: 16px; }
        .alert-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 13px;
            border-radius: 10px;
            font-size: .83rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alert-item.error   { background:#fee2e2; color:#1b4399; border:1px solid #fecaca; }
        .alert-item.success { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }

        /* Inputs */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: .7rem;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 6px;
        }

        .input-wrap { position: relative; display: flex; align-items: center; }

        .input-icon {
            position: absolute; left: 13px;
            color: #9ca3af; font-size: .85rem;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            border: 1.5px solid #e5e7eb;
            border-radius: 11px;
            font-size: .9rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--texto);
            background: #f9fafb;
            transition: border-color .15s, box-shadow .15s, background .15s;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: var(--rojo-mid);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(185,28,28,.1);
        }

        .input-wrap input::placeholder { color: #d1d5db; }

        .toggle-pass {
            position: absolute; right: 13px;
            color: #9ca3af; cursor: pointer;
            font-size: .85rem; transition: color .15s;
        }
        .toggle-pass:hover { color: var(--rojo-mid); }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--rojo);
            color: #fff;
            border: none;
            border-radius: 11px;
            font-family: 'DM Sans', sans-serif;
            font-size: .92rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s, transform .15s, box-shadow .2s;
            letter-spacing: .01em;
        }
        .btn-login:hover {
            background: var(--rojo-mid);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(155,28,28,.4);
        }
        .btn-login:active { transform: translateY(0); box-shadow: none; }

        /* Pie */
        .card-footer {
            padding: 16px 36px 24px;
            text-align: center;
            border-top: 1px solid #f3f4f6;
        }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .76rem;
            color: var(--gris);
        }
        .secure-badge i { color: var(--rojo-light); font-size: .8rem; }

        /* Animación */
        @keyframes popIn {
            from { opacity: 0; transform: scale(.96) translateY(16px); }
            to   { opacity: 1; transform: scale(1)   translateY(0); }
        }
        .card { animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }

        @media (max-width: 480px) {
            .card-header  { padding: 24px 24px 22px; }
            .card-body    { padding: 28px 24px 24px; }
            .card-footer  { padding: 14px 24px 20px; }
        }
    </style>
</head>
<body>

<div class="deco-1"></div>
<div class="deco-2"></div>

<div class="card">

    <!-- Cabecera -->
    <div class="card-header">
        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="Logo Tienda El Despecho">
        </div>
        <div class="card-title">Tienda <span>El Despecho</span></div>
        <div class="card-sub">Panel Administrativo · Gestión de Inventario</div>
    </div>

    <!-- Formulario -->
    <div class="card-body">
        <div class="form-eyebrow">Acceso seguro</div>
        <div class="form-title">Bienvenido de nuevo</div>

        {% if messages %}
        <div class="alerts">
            {% for message in messages %}
            <div class="alert-item {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                <i class="fa-solid {% if message.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Usuario</label>
                <div class="input-wrap">
                    <i class="input-icon fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="Ingresa tu usuario"
                           required autofocus autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="input-wrap">
                    <i class="input-icon fa-solid fa-lock"></i>
                    <input type="password" name="password" id="passwordInput"
                           placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    <span class="toggle-pass" onclick="togglePass()">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket" style="margin-right:8px"></i>
                Ingresar al panel
            </button>
        </form>
    </div>

    <!-- Pie -->
    <div class="card-footer">
        <span class="secure-badge">
            <i class="fa-solid fa-shield-halved"></i>
            Solo para personal autorizado · Grupo 3
        </span>
    </div>

</div>

<script>
function togglePass() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
