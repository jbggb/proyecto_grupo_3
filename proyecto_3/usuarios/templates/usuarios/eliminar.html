{% extends 'base.html' %}
{% block content %}

<div class="section-header">
    <h1 class="section-title">
        <i class="fa-solid fa-user-slash"></i> Desactivar Usuario
    </h1>
</div>

<div class="card" style="max-width: 500px;">
    <div class="card-body p-4">
        <p>¿Estás seguro de que deseas desactivar al usuario <strong>{{ object.username }}</strong>?</p>
        <p class="text-muted" style="font-size: .9rem;">
            <i class="fa-solid fa-circle-info me-1"></i>
            El usuario no será eliminado — solo se desactivará y no podrá iniciar sesión.
        </p>
        <div class="d-flex gap-2 mt-4">
            <a href="{% url 'usuarios:listar' %}" class="btn btn-secondary">
                <i class="fa-solid fa-times me-1"></i> Cancelar
            </a>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    <i class="fa-solid fa-user-slash me-1"></i> Sí, desactivar
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
